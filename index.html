<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shore Mfg</title>
<style>
  :root {
    --sage: #a8b99b;
    --plum: #4a2f3a;
    --plum-light: #6b4756;
    --cream: #f4f1ea;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
  }

  body {
    background: var(--sage);
    color: var(--plum);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }

  .wrap {
    width: 100%;
    max-width: 440px;
    text-align: center;
  }

  .logo {
    width: 100%;
    max-width: 340px;
    height: auto;
    margin: 0 auto 40px;
    display: block;
  }
</style>
</head>
<body>

  <div class="wrap">
    <img class="logo" src="shore-mfg-logo.png" alt="Shore Mfg">
  </div>

  
</body>
</html>
